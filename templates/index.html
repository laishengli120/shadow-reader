<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shadow Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
============================================================ */
:root {
  --bg:        #F0EBE3;
  --white:     #FFFFFF;
  --black:     #111111;
  --yellow:    #FFD600;
  --pink:      #FF3D71;
  --cyan:      #00D4FF;
  --green:     #00C48C;
  --gray-50:   #F9F9F9;
  --gray-100:  #F2F2F2;
  --gray-200:  #E5E5E5;
  --gray-400:  #A0A0A0;
  --gray-500:  #6B7280;
  --gray-700:  #374151;

  --border:    2px solid var(--black);
  --border-sm: 1.5px solid var(--black);
  --shadow-s:  3px 3px 0 var(--black);
  --shadow-m:  5px 5px 0 var(--black);

  --font-display: 'Syne', 'Noto Sans SC', sans-serif;
  --font-mono:    'Space Mono', monospace;
  --font-body:    'Noto Sans SC', system-ui, sans-serif;

  --sidebar-w: 280px;
  --header-h:  58px;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  background-image: radial-gradient(var(--black) 1.2px, transparent 1.2px);
  background-size: 26px 26px;
  color: var(--black);
  min-height: 100vh;
}

/* ============================================================
   LAYOUT
============================================================ */
.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-areas:
    "header  header"
    "sidebar main";
  min-height: 100vh;
  max-width: 1160px;
  margin: 0 auto;
  background: var(--white);
  border-left: var(--border);
  border-right: var(--border);
}

/* ============================================================
   HEADER
============================================================ */
.app-header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--black);
  color: var(--white);
  border-bottom: var(--border);
  position: sticky;
  top: 0;
  z-index: 20;
  height: var(--header-h);
}

/* FIX: Toned down logo shadow — subtle depth, not circus */
.logo {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--white);
  text-shadow: 2px 2px 0 rgba(0,212,255,0.5);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.lang-pill {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1.5px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.5);
  padding: 4px 10px;
  cursor: pointer;
  background: transparent;
  transition: all 0.15s;
}
.lang-pill.active { border-color: var(--cyan); color: var(--cyan); }
.lang-pill:hover  { border-color: var(--white); color: var(--white); }

.btn-settings-mobile {
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  width: 36px; height: 36px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-settings-mobile:hover { background: rgba(255,255,255,0.2); }

/* ============================================================
   SIDEBAR
============================================================ */
.app-sidebar {
  grid-area: sidebar;
  border-right: var(--border);
  background: var(--gray-50);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto;
}

.sidebar-section {
  padding: 18px;
  border-bottom: var(--border-sm);
}
.sidebar-section:last-child { border-bottom: none; }

.sidebar-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 14px;
}

/* ============================================================
   FORM ELEMENTS
============================================================ */
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }

label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--gray-500);
}

/* FIX: API key input styled consistently — no longer an alien element */
.api-key-wrap {
  position: relative;
}
.api-key-wrap input {
  padding-right: 36px;
}
.api-key-eye {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  color: var(--gray-400);
  line-height: 1;
  padding: 0;
  display: flex;
  align-items: center;
}
.api-key-eye:hover { color: var(--black); }

input[type="password"],
input[type="text"],
input[type="number"],
select {
  width: 100%;
  padding: 9px 12px;
  border: var(--border-sm);
  background: var(--white);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--black);
  appearance: none;
  -webkit-appearance: none;
  transition: box-shadow 0.15s;
}
input:focus, select:focus {
  outline: none;
  box-shadow: var(--shadow-s);
}

/* FIX: Hint text legible but clearly secondary */
.field-hint {
  font-size: 11px;
  color: var(--gray-400);
  line-height: 1.5;
  font-family: var(--font-mono);
}

/* FIX: Key status indicator inside input area */
.key-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--gray-400);
  margin-top: 4px;
}
.key-status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gray-200);
  flex-shrink: 0;
}
.key-status.ok .key-status-dot { background: var(--green); }
.key-status.ok { color: var(--green); }

.select-wrap {
  position: relative;
}
.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  font-size: 12px;
  color: var(--gray-500);
}

/* Stepper */
.stepper {
  display: flex;
  align-items: stretch;
  border: var(--border-sm);
}
.stepper button {
  width: 38px;
  background: var(--gray-100);
  border: none;
  border-right: var(--border-sm);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.1s;
}
.stepper button:last-child { border-right: none; border-left: var(--border-sm); }
.stepper button:hover { background: var(--yellow); }
.stepper input {
  flex: 1;
  border: none;
  text-align: center;
  padding: 9px 0;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
}
.stepper input:focus { outline: none; box-shadow: none; }
.stepper input[type="number"]::-webkit-inner-spin-button,
.stepper input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
.stepper input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

/* ============================================================
   MAIN
============================================================ */
.app-main {
  grid-area: main;
  display: flex;
  flex-direction: column;
}

/* Input zone */
.input-zone {
  padding: 20px 24px;
  border-bottom: var(--border-sm);
  background: var(--white);
}

.zone-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.zone-label::before {
  content: '';
  width: 7px; height: 7px;
  background: var(--yellow);
  border: 1.5px solid var(--black);
  flex-shrink: 0;
}

textarea {
  width: 100%;
  padding: 12px 14px;
  border: var(--border-sm);
  background: var(--gray-50);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.9;
  color: var(--black);
  resize: vertical;
  min-height: 130px;
  transition: background 0.2s, box-shadow 0.2s;
}
textarea:focus {
  outline: none;
  background: var(--white);
  box-shadow: var(--shadow-s);
}
textarea::placeholder { color: var(--gray-400); }

/* ============================================================
   CONTROL STRIP — FIX: clearer visual hierarchy
============================================================ */
.control-strip {
  padding: 14px 24px;
  border-bottom: var(--border-sm);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  background: var(--white);
}

/* FIX: Toast-style inline error — no more alert() */
.toast-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: #FFF0F0;
  border: 1.5px solid var(--pink);
  border-left: 4px solid var(--pink);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: #C0003A;
  width: 100%;
  order: 10;
}
.toast-bar.visible { display: flex; }
.toast-bar-close {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: #C0003A;
  font-size: 16px;
  line-height: 1;
}

/* FIX: Buttons — Generate is clearly primary */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 16px;
  border: var(--border-sm);
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--black);
  box-shadow: var(--shadow-s);
  transition: transform 0.08s, box-shadow 0.08s;
  white-space: nowrap;
  background: var(--white);
}
.btn:active:not(:disabled) {
  transform: translate(3px, 3px);
  box-shadow: none;
}
.btn:disabled {
  background: var(--gray-100) !important;
  color: var(--gray-400) !important;
  box-shadow: none;
  cursor: not-allowed;
}

/* Primary action: prominent yellow */
.btn-generate { background: var(--yellow); }

/* Secondary: outlined style for play/download — less competing weight */
.btn-play, .btn-download {
  background: var(--white);
  box-shadow: var(--shadow-s);
}
.btn-play:not(:disabled):hover     { background: var(--cyan); }
.btn-download:not(:disabled):hover { background: var(--pink); }

.spinner {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid transparent;
  border-top-color: var(--black);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.is-loading .spinner    { display: block; }
.is-loading .btn-icon   { display: none; }

/* FIX: Status badge — lowercase, softer, smaller footprint */
.status-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 6px 12px;
  border: var(--border-sm);
  margin-left: auto;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--gray-50);
  text-transform: none;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gray-200);
  flex-shrink: 0;
}
.status-badge[data-state="s_ready"]       .status-dot { background: var(--green); }
.status-badge[data-state="s_syncing"]     .status-dot { background: var(--yellow); animation: blink 0.8s infinite; }
.status-badge[data-state="s_audio_ready"] .status-dot { background: var(--cyan); }
.status-badge[data-state="s_playing"]     .status-dot { background: var(--cyan); animation: blink 0.5s infinite; }
.status-badge[data-state="s_your_turn"]   .status-dot { background: var(--pink); animation: blink 0.6s infinite; }
.status-badge[data-state="s_error"]       .status-dot { background: var(--pink); }
.status-badge[data-state="s_finished"]    .status-dot { background: var(--green); }
.status-badge[data-state="s_paused"]      .status-dot { background: var(--yellow); }

@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.2; }
}

/* ============================================================
   FIX: Progress bar — taller and more visible
============================================================ */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 24px;
  height: 28px;
  border-bottom: var(--border-sm);
  background: var(--white);
}
.progress-track {
  flex: 1;
  height: 6px;          /* FIX: was 4px */
  background: var(--gray-200);
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--cyan);
  width: 0%;
  transition: width 0.1s linear;
}
.progress-time {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--gray-400);
  min-width: 80px;
  text-align: right;
  letter-spacing: 0.5px;
}

/* ============================================================
   OUTPUT / READ BOARD
   FIX: Improved text contrast — was rgba(255,255,255,0.35), now 0.55+
============================================================ */
.output-zone {
  flex: 1;
  padding: 20px 24px;
  background: #0F0F0F;
  min-height: 200px;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-height: 180px;
  color: rgba(255,255,255,0.25);
  font-family: var(--font-mono);
  font-size: 11px;
  text-align: center;
  letter-spacing: 1px;
}

/* FIX: line items are now clickable (seek to that sentence) */
.text-line {
  display: flex;
  align-items: baseline;
  gap: 10px;
  color: rgba(255,255,255,0.55);  /* FIX: up from 0.35 */
  font-family: var(--font-mono);
  font-size: clamp(13px, 2vw, 16px);
  line-height: 1.9;
  padding: 5px 12px 5px 14px;
  border-left: 3px solid transparent;
  cursor: pointer;
  border-radius: 0;
  transition: color 0.18s, border-color 0.18s, background 0.18s;
}
.text-line:hover {
  color: rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.04);
}
.text-line.active {
  color: var(--yellow);
  border-left-color: var(--pink);
  background: rgba(255, 214, 0, 0.07);
  font-weight: 700;
}
.line-num {
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  min-width: 20px;
  text-align: right;
  flex-shrink: 0;
  user-select: none;
}
.text-line.active .line-num { color: rgba(255, 214, 0, 0.5); }

/* ============================================================
   MOBILE
============================================================ */
@media (max-width: 768px) {
  .app-shell {
    grid-template-columns: 1fr;
    grid-template-rows: var(--header-h) 1fr;
    grid-template-areas:
      "header"
      "main";
    border: none;
  }

  .app-sidebar {
    display: none;
    position: fixed;
    inset: 0;
    top: auto;
    height: auto;
    max-height: 82vh;
    z-index: 100;
    border-right: none;
    border-top: var(--border);
    overflow-y: auto;
    overscroll-behavior: contain;
    background: var(--white);
  }
  .app-sidebar.open {
    display: flex;
    flex-direction: column;
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .mobile-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 99;
    backdrop-filter: blur(2px);
  }
  .mobile-backdrop.open { display: block; }

  .sheet-handle {
    display: flex;
    justify-content: center;
    padding: 10px;
    border-bottom: var(--border-sm);
  }
  .sheet-handle-bar {
    width: 36px; height: 4px;
    background: var(--gray-200);
    border-radius: 2px;
  }

  .input-zone, .output-zone { padding: 14px 16px; }
  .control-strip { padding: 10px 16px; }
  .progress-wrap { padding: 0 16px; }

  .btn-generate { flex: 1 1 100%; }
  .btn-play, .btn-download { flex: 1; }
  .status-badge { margin-left: 0; width: 100%; justify-content: center; }
  .btn-settings-mobile { display: flex !important; }
}
@media (min-width: 769px) {
  .sheet-handle { display: none; }
}

audio { display: none; }
</style>
</head>
<body>

<div class="mobile-backdrop" id="mobileBackdrop" onclick="closeSidebar()"></div>

<div class="app-shell">

  <!-- HEADER -->
  <header class="app-header">
    <span class="logo">Shadow Reader</span>
    <div class="header-right">
      <button class="lang-pill active" id="langEN" onclick="setLang('en')">EN</button>
      <button class="lang-pill"        id="langZH" onclick="setLang('zh')">中文</button>
      <button class="btn-settings-mobile" onclick="openSidebar()" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="app-sidebar" id="appSidebar">
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>

    <div class="sidebar-section">
    <p class="sidebar-title" data-i18n="settingsTitle">偏好设置</p>
 
    <div class="form-group">
      <label data-i18n="providerLabel">服务商</label>
      <div class="select-wrap">
        <select id="providerSelect" onchange="onProviderChange()">
          <optgroup id="optgroupPaid" label="付费服务商（需要 API Key）">
            <option value="openai">OpenAI</option>
            <option value="siliconflow">硅基流动 SiliconFlow</option>
            <option value="dashscope">阿里云 DashScope</option>
            <option value="volcengine">火山引擎 Volcengine</option>
            <option value="azure">微软 Azure TTS</option>
          </optgroup>
          <optgroup id="optgroupFree" label="免费服务商（无需 API Key）">
            <option value="edge-tts">Edge TTS ★ 推荐</option>
            <option value="gtts">gTTS (Google)</option>
            <option value="pyttsx3">pyttsx3（离线）</option>
          </optgroup>
        </select>
      </div>
    </div>
 
    <div class="form-group" id="apiKeyGroup">
      <label data-i18n="apiKeyLabel">API 密钥 / 凭证</label>
      <div class="api-key-wrap">
        <input type="password" id="apiKeyInput" placeholder="sk-..."
               oninput="onApiKeyChange()" autocomplete="off">
        <button class="api-key-eye" onclick="toggleKeyVisibility()" type="button">...</button>
      </div>
      <p id="credHint" class="field-hint" style="display:none"
         data-i18n="credJsonHint">此服务商需填写 JSON 格式凭证，请参考占位符示例。</p>
      <div class="key-status" id="keyStatus">
        <span class="key-status-dot"></span>
        <span id="keyStatusText" data-i18n="keyEmpty">尚未输入凭证</span>
      </div>
    </div>
 
    <div class="form-group">
      <label data-i18n="voiceLabel">朗读音色</label>
      <div class="select-wrap">
        <select id="voiceSelect" onchange="saveSettings()"></select>
      </div>
    </div>
 
    <div class="form-group">
      <label data-i18n="langFilterLabel">按语言筛选音色</label>
      <div class="select-wrap">
        <select id="langFilter" onchange="applyVoiceFilter()">
          <option value="all"   data-i18n="langAll">全部语言</option>
          <option value="en"    data-i18n="langEn">仅英文</option>
          <option value="zh"    data-i18n="langZh">仅中文</option>
          <option value="zh/en" data-i18n="langBilingual">中英双语</option>
        </select>
      </div>
    </div>
 
    <div class="form-group">
      <label data-i18n="pauseLabel">跟读等待时间（秒）</label>
      <div class="stepper">
        <button type="button" onclick="stepInterval(-0.5)">−</button>
        <input type="number" id="intervalInput" min="0" max="10" step="0.5" value="2"
               onchange="saveSettings()">
        <button type="button" onclick="stepInterval(0.5)">+</button>
      </div>

  el.classList.toggle('ok', valid);

function stepInterval(delta) {
  const input = document.getElementById('intervalInput');
  let v = parseFloat(input.value) + delta;
  v = Math.min(10, Math.max(0, Math.round(v * 2) / 2));

/* ================================================================
   Core audio
================================================================ */
const audioPlayer  = document.getElementById('audioPlayer');
const readBoard    = document.getElementById('readBoard');
const playBtn      = document.getElementById('playBtn');
const downloadBtn  = document.getElementById('downloadBtn');
const syncBtn      = document.getElementById('syncBtn');
const playText     = document.getElementById('playText');
const playIcon     = document.getElementById('playIcon');
const progressFill = document.getElementById('progressFill');
const progressTime = document.getElementById('progressTime');

let currentTimings = [];
let audioBlobUrl   = null;
let rafId          = null;

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

async function generateAudio() {
  closeToast();
  const text   = document.getElementById('textInput').value.trim();
  const apiKey = document.getElementById('apiKeyInput').value.trim();

  if (!text) {
    showToast(lang === 'zh' ? '请先输入文本内容' : 'Please enter some text first.');
    return;
  }
  if (!apiKey) {
    showToast(lang === 'zh' ? '请在设置中输入 OpenAI API Key' : 'Please enter your OpenAI API Key in settings.');
    openSidebar();
    return;
  }

  syncBtn.disabled   = true;
  syncBtn.classList.add('is-loading');
  playBtn.disabled   = true;
  downloadBtn.disabled = true;
  setStatus('s_syncing');

  try {
    const res  = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        interval: document.getElementById('intervalInput').value,
        api_key:  apiKey,
        voice:    document.getElementById('voiceSelect').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    const raw  = atob(data.audio_base64);
    const buf  = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    const blob = new Blob([buf], { type: 'audio/mpeg' });

    if (audioBlobUrl) URL.revokeObjectURL(audioBlobUrl);
    audioBlobUrl  = URL.createObjectURL(blob);
    audioPlayer.src = audioBlobUrl;

    currentTimings = data.timings;
    buildReadBoard();
    setStatus('s_audio_ready');
    playBtn.disabled     = false;
    downloadBtn.disabled = false;

  } catch (e) {
    console.error(e);
    setStatus('s_error');
    showToast(e.message);  // FIX: inline toast, not alert()
  } finally {
    syncBtn.disabled = false;
    syncBtn.classList.remove('is-loading');
  }
}

function buildReadBoard() {
  readBoard.innerHTML = '';
  currentTimings.forEach((timing, i) => {
    const row = document.createElement('div');
    row.className = 'text-line';
    row.id        = `line-${timing.index}`;
    row.title     = t('seekHint');   // ★ 使用 i18n
    row.onclick   = () => seekToLine(timing);
 
    const num = document.createElement('span');
    num.className   = 'line-num';
    num.textContent = i + 1;
 
    const txt = document.createElement('span');
    txt.textContent = timing.text;
 
    row.appendChild(num);
    row.appendChild(txt);
    readBoard.appendChild(row);
  });
}

// FIX: seek to line on click
function seekToLine(timing) {
  if (!audioBlobUrl) return;
  audioPlayer.currentTime = timing.start_time;
  if (audioPlayer.paused) {
    audioPlayer.play();
    setStatus('s_playing');
    if (!rafId) rafId = requestAnimationFrame(tick);
  }
  refreshPlayBtn();
}

function refreshPlayBtn() {
  if (!audioPlayer.paused && audioPlayer.src) {
    playText.textContent    = t('pauseBtn');
    playIcon.innerHTML      = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    playText.textContent    = t('playBtn');
    playIcon.innerHTML      = '<polygon points="5,3 19,12 5,21"/>';
  }
}

function togglePlay() {
  if (audioPlayer.paused) {
    audioPlayer.play();
    setStatus('s_playing');
    if (!rafId) rafId = requestAnimationFrame(tick);
  } else {
    audioPlayer.pause();
    setStatus('s_paused');
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }
  refreshPlayBtn();
}

audioPlayer.addEventListener('ended', () => {
  setStatus('s_finished');
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  document.querySelectorAll('.text-line').forEach(el => el.classList.remove('active'));
  progressFill.style.width = '0%';
  progressTime.textContent = '0:00 / 0:00';
  refreshPlayBtn();
});

function tick() {
  if (audioPlayer.paused) { rafId = null; return; }

  const cur = audioPlayer.currentTime;
  const dur = audioPlayer.duration || 0;

  // FIX: time display
  if (dur > 0) {
    progressFill.style.width  = `${(cur / dur) * 100}%`;
    progressTime.textContent  = `${fmtTime(cur)} / ${fmtTime(dur)}`;
  }

  let silent = true;
  currentTimings.forEach(timing => {
    const el = document.getElementById(`line-${timing.index}`);
    if (!el) return;
    if (cur >= timing.start_time && cur <= timing.end_time) {
      el.classList.add('active');
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      silent = false;
    } else {
      el.classList.remove('active');
    }
  });
  setStatus(silent ? 's_your_turn' : 's_listening');

  rafId = requestAnimationFrame(tick);
}

function downloadAudio() {
  if (!audioBlobUrl) return;
  const a = document.createElement('a');
  a.href     = audioBlobUrl;
  a.download = lang === 'zh' ? '英语跟读训练.mp3' : 'shadow_reader.mp3';
  a.click();
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  setLang('zh');
  refreshKeyStatus();
});
</script>

const FREE_PROVIDERS = new Set(["edge-tts", "gtts", "pyttsx3"]);
// ── 切换服务商 ──────────────────────────────────────────────────
function onProviderChange() {
  const provider    = document.getElementById('providerSelect').value;
  const isFree      = FREE_PROVIDERS.has(provider);
  const keyGroup    = document.getElementById('apiKeyGroup');   // 整个 Key 表单组
  const credHint    = document.getElementById('credHint');
  const apiKeyInput = document.getElementById('apiKeyInput');
 
  // ── 免费服务商：隐藏整个 API Key 输入区 ──
  keyGroup.style.display = isFree ? 'none' : '';
 
  if (!isFree) {
    // 付费服务商：更新 placeholder 和格式提示
    const hint = _providersData?.credential_hints?.[provider];
    if (hint) {
      apiKeyInput.placeholder = hint.placeholder;
      if (hint.format === 'json') {
        credHint.textContent = '⚠ 此服务商需填写 JSON 凭证，' + hint.hint;
        credHint.style.display = 'block';
      } else {
        credHint.style.display = 'none';
      }
    }
    // 还原该服务商上次保存的 key
    apiKeyInput.value = localStorage.getItem(`sr_api_key_${provider}`) || '';
  }
 
  // pyttsx3 离线服务商：动态获取系统音色列表
  if (provider === 'pyttsx3') {
    fetchPyttsx3Voices();
  } else {
    _currentVoices = _providersData?.voices?.[provider] ?? [];
    applyVoiceFilter();
  }
 
  saveSettings();
  refreshKeyStatus();
}
async function fetchPyttsx3Voices() {
  try {
    const res  = await fetch('/system-voices');
    const data = await res.json();
    _currentVoices = data.voices ?? [];
  } catch {
    // 后端不可达时 fallback 到静态列表
    _currentVoices = _providersData?.voices?.pyttsx3 ?? [];
  }
  applyVoiceFilter();
}
 
// ── 按语言过滤音色 ───────────────────────────────────────────────
function applyVoiceFilter() {
  const filter   = document.getElementById('langFilter').value;
  const sel      = document.getElementById('voiceSelect');
  const provider = document.getElementById('providerSelect').value;
  const saved    = localStorage.getItem(`sr_voice_${provider}`);
 
  const filtered = filter === 'all'
    ? _currentVoices
    : _currentVoices.filter(v => v.lang === filter || v.lang === 'zh/en');
 
  sel.innerHTML = '';
 
  if (filtered.length === 0) {
    const opt       = document.createElement('option');
    opt.textContent = t('voiceEmpty');   // ★ 使用 i18n
    opt.disabled    = true;
    sel.appendChild(opt);
    return;
  }
 
  filtered.forEach(({ value, label }) => {
    const opt    = document.createElement('option');
    opt.value    = value;
    opt.textContent = label;
    if (value === saved) opt.selected = true;
    sel.appendChild(opt);
  });
 
  saveSettings();
}
 
// ── 凭证状态指示 ────────────────────────────────────────────────
function refreshKeyStatus() {
  const val = document.getElementById('apiKeyInput').value.trim();
  const el  = document.getElementById('keyStatus');
  const txt = document.getElementById('keyStatusText');
  const provider = document.getElementById('providerSelect').value;
 
  const hint   = _providersData?.credential_hints?.[provider];
  const isJson = hint?.format === 'json';
 
  let valid = false;
  if (isJson) {
    try { JSON.parse(val); valid = val.length > 10; } catch {}
  } else {
    valid = val.length >= 10;
  }
 
  el.classList.toggle('ok', valid);
  txt.textContent = valid ? '凭证已保存到本地' : (isJson ? '请输入 JSON 凭证' : '未输入密钥');
}
 
function onApiKeyChange() {
  saveSettings();
  refreshKeyStatus();
}
 
// ── 保存 / 读取设置 ─────────────────────────────────────────────
function saveSettings() {
  const provider = document.getElementById('providerSelect').value;
  const voice    = document.getElementById('voiceSelect').value;
  localStorage.setItem('sr_api_key',           document.getElementById('apiKeyInput').value);
  localStorage.setItem('sr_provider',          provider);
  localStorage.setItem(`sr_voice_${provider}`, voice);
  localStorage.setItem('sr_interval',          document.getElementById('intervalInput').value);
  localStorage.setItem('sr_lang_filter',       document.getElementById('langFilter').value);
}
 
async function loadSettings() {
  await initProviders();
  const provider = localStorage.getItem('sr_provider') || 'openai';
  const interval = localStorage.getItem('sr_interval');
  const filter   = localStorage.getItem('sr_lang_filter') || 'all';

  document.getElementById('providerSelect').value = provider;
  document.getElementById('intervalInput').value  = interval || 2;
  document.getElementById('langFilter').value     = filter;

  // ✅ 读取该 provider 对应的 key（而不是通用的 sr_api_key）
  const savedKey = localStorage.getItem(`sr_api_key_${provider}`) || '';
  document.getElementById('apiKeyInput').value = savedKey;

  onProviderChange();
}
 
// ── 生成音频（覆盖原函数，加入 provider 字段）──────────────────
async function generateAudio() {
  closeToast();
  const text     = document.getElementById('textInput').value.trim();
  const provider = document.getElementById('providerSelect').value;
  const voice    = document.getElementById('voiceSelect').value;
  const interval = document.getElementById('intervalInput').value;
  const isFree   = FREE_PROVIDERS.has(provider);
  const apiKey   = isFree ? '' : document.getElementById('apiKeyInput').value.trim();
 
  if (!text) { showToast('请先输入文本内容'); return; }
  if (!isFree && !apiKey) { showToast('请输入 API 凭证'); openSidebar(); return; }
 
  syncBtn.disabled = true;
  syncBtn.classList.add('is-loading');
  playBtn.disabled = downloadBtn.disabled = true;
  setStatus('s_syncing');
 
  try {
    const body = { text, provider, voice, interval };
    if (!isFree) body.api_key = apiKey;   // 免费服务商不传 key
 
    const res  = await fetch('/generate', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');
 
    const raw = atob(data.audio_base64);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    const blob = new Blob([buf], { type: 'audio/mpeg' });
 
    if (audioBlobUrl) URL.revokeObjectURL(audioBlobUrl);
    audioBlobUrl    = URL.createObjectURL(blob);
    audioPlayer.src = audioBlobUrl;
    currentTimings  = data.timings;
    buildReadBoard();
    setStatus('s_audio_ready');
    playBtn.disabled = downloadBtn.disabled = false;
 
  } catch (e) {
    console.error(e);
    setStatus('s_error');
    showToast(e.message);
  } finally {
    syncBtn.disabled = false;
    syncBtn.classList.remove('is-loading');
  }
}
 
// DOMContentLoaded 中调用异步 loadSettings
document.addEventListener('DOMContentLoaded', async () => {
  await loadSettings();
  setLang('zh');
  refreshKeyStatus();
});
